<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1" />
  <title>ComfyStudio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .splash-image {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .splash-status {
      flex-shrink: 0;
      padding: 10px 16px;
      font-size: 12px;
      color: #737373;
      text-align: center;
      background: rgba(10, 10, 11, 0.95);
      border-top: 1px solid #2d2d2d;
    }
  </style>
</head>
<body>
  <img
    class="splash-image"
    src="splash.png"
    alt=""
    onerror="this.onerror=null; this.src='splash.jpg'"
  />
  <div id="splash-status" class="splash-status">Starting ComfyStudio…</div>
</body>
</html>
